name: RAG Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    name: RAGAS Evaluation
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip dependencies ──────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      # ── 4. Install dependencies ────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Configure AWS credentials ───────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 6. Restore chroma_db cache ─────────────────────────────────
      #    Keyed on pdf_version.txt — bump that file when you upload
      #    a new PDF to S3. Cache miss triggers re-ingest (~$0.02).
      #    Cache hit skips ingest entirely.
      - name: Restore vector store cache
        id: cache-chroma
        uses: actions/cache@v4
        with:
          path: chroma_db/
          key: chroma-${{ hashFiles('pdf_version.txt') }}

      # ── 7. Download PDF from S3 (cache miss only) ──────────────────
      - name: Download PDF from S3
        if: steps.cache-chroma.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/ACOTAR_MistAndFury.pdf data/ACOTAR_MistAndFury.pdf

      # ── 8. Run ingestion pipeline (cache miss only) ────────────────
      - name: Run ingestion pipeline
        if: steps.cache-chroma.outputs.cache-hit != 'true'
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EMBEDDING_MODEL: amazon.titan-embed-text-v2:0
        run: python ingest.py

      # ── 9. Run RAGAS evaluation ────────────────────────────────────
      - name: Run RAGAS evaluation
        id: ragas
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EMBEDDING_MODEL: amazon.titan-embed-text-v2:0
          LLM_MODEL: us.anthropic.claude-haiku-4-5-20251001-v1:0
          TEMPERATURE: "0.3"
          MAX_TOKENS: "1000"
          TOP_K_RETRIEVAL: "20"
          TOP_K_FINAL: "5"
          RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
        run: python evaluation/evaluate.py

      # ── 10. Upload results (always, even on failure) ───────────────
      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-results-${{ github.sha }}
          path: evaluation/results/
          retention-days: 30